kind = "web"
previewPath = "/"
title = "PartyPulse"
version = "1.0.0"
id = "artifacts/partypulse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19935

[services.development]
run = "pnpm --filter @workspace/partypulse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/partypulse", "run", "build" ]
publicDir = "artifacts/partypulse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19935"
BASE_PATH = "/"
